<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
    .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
    <input type="text" id="userName" placeholder="Ваше имя" required>
    <input type="email" id="userEmail" placeholder="Ваш email" required>
    <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
// Импортируем модули Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

// НОВЫЕ КЛЮЧИ (со второго скриншота - проект ssonin-333a9)
const firebaseConfig = {
    apiKey: "AIzaSyAB5Z7MEW6p1xW_vSytL0YFisw5dxkx7iY",
    authDomain: "ssonin-333a9.firebaseapp.com",
    projectId: "ssonin-333a9",
    storageBucket: "ssonin-333a9.firebasestorage.app",
    messagingSenderId: "209859757037",
    appId: "1:209859757037:web:a35107277f8e326ec29de4",
    measurementId: "G-JYVJ8KNZD1"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const analytics = getAnalytics(app);

// Логика кнопки отправки
document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const nameInput = document.getElementById("userName").value;
    const emailInput = document.getElementById("userEmail").value;

    try {
        await addDoc(collection(db, "requests"), {
            name: nameInput,
            email: emailInput,
            timestamp: new Date()
        });
        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("feedbackForm").reset();
    } catch (error) {
        console.error("Ошибка записи: ", error);
        alert("Ошибка при отправке: " + error.message);
    }
});
</script>

</body>
</html>
